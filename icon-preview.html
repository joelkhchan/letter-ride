<!DOCTYPE html><html><head><meta charset="utf-8"><style>html,body{margin:0;padding:0}</style></head><body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#18283f"/>
      <stop offset="100%" stop-color="#0b1424"/>
    </radialGradient>
    <linearGradient id="ivory" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f0db"/>
      <stop offset="100%" stop-color="#dbc9a3"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- drop shadow -->
  <rect x="260" y="280" width="504" height="504" rx="58" fill="#000" opacity="0.34"/>
  <!-- tile face -->
  <rect x="260" y="260" width="504" height="504" rx="58" fill="url(#ivory)" stroke="#b8902f" stroke-width="8"/>
  <!-- inner gold hairline -->
  <rect x="282" y="282" width="460" height="460" rx="40" fill="none" stroke="#c4a052" stroke-width="3" opacity="0.55"/>
  <!-- letter L (struck dark, like the in-game tiles) -->
  <text x="500" y="540" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="372" fill="#16203a" text-anchor="middle" dominant-baseline="middle">L</text>
  <!-- tile value -->
  <text x="678" y="672" font-family="Georgia,serif" font-weight="700" font-size="116" fill="#16203a" text-anchor="middle" dominant-baseline="middle">1</text>
</svg>
</body></html>
